user www-data;  
worker_processes auto;  
pid /run/nginx.pid;  
include /etc/nginx/modules-enabled/*.conf;  
  
events {  
    worker_connections 768;  
    # multi_accept on;  
}  

http {
	# sendfile on;
	# tcp_nopush on;
	# types_hash_max_size 2048;
	# # server_tokens off;

	# # server_names_hash_bucket_size 64;
	# # server_name_in_redirect off;

	include /etc/nginx/mime.types;
	default_type application/octet-stream;
	# ##
	# # SSL Settings
	# ##

	# ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3; # Dropping SSLv3, ref: POODLE
	# ssl_prefer_server_ciphers on;

	# ##
	# # Logging Settings
	# ##

	# access_log /var/log/nginx/access.log;
	# error_log /var/log/nginx/error.log;

	# ##
	# # Gzip Settings
	# ##

	# gzip on;

	# # gzip_vary on;
	# # gzip_proxied any;
	# # gzip_comp_level 6;
	# # gzip_buffers 16 8k;
	# # gzip_http_version 1.1;
	# # gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

	# ##
	# # Virtual Host Configs
	# ##

	# include /etc/nginx/conf.d/*.conf;
	# include /etc/nginx/sites-available/*;
	# include /etc/nginx/sites-enabled/*;

        # 处理静态文件
upstream hello {  
    server localhost:3000;  
}
server {
		listen 80 default_server;
		server_name _; # 如果你映射了域名，那么可以写在这里
	        root /var/www/html;  
		access_log /var/log/nginx/access.log;
		error_log /var/log/nginx/error.log;
		location /message_board {
       		proxy_pass http://127.0.0.1:8000;
		proxy_redirect       off;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		}
 		location /node_example {  
       		 proxy_pass http://hello;  
       		  proxy_set_header Host $http_host;  
		  proxy_set_header X-Real-IP $remote_addr;  
      		    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  
     		       proxy_set_header X-Forwarded-Proto $scheme;
		       proxy_set_header X-Nginx-proxy true;
 		  }  
  		location /run_program {
       		proxy_pass http://127.0.0.1:8001/run_program;
		proxy_redirect       off;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		}
		location /fazhijingling {
       		proxy_pass http://127.0.0.1:8001/fazhijingling;
		proxy_redirect       off;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		}
		location /note {
		# rewrite ^/note(/.*)$ $1 break; 
       		proxy_pass http://127.0.0.1:5000/note;
		proxy_redirect       off;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		}
		location /note/delete-note {
       		proxy_pass http://127.0.0.1:5000/note/delete-note;
		proxy_redirect       off;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		}
		location /note/login {
       		proxy_pass http://127.0.0.1:5000/note/login;
		proxy_redirect       off;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		}
		location /note/logout {
       		proxy_pass http://127.0.0.1:5000/note/logout;
		proxy_redirect       off;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		}
		location /note/sign-up {
       		proxy_pass http://127.0.0.1:5000/note/sign-up;
		proxy_redirect       off;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		}

location /static {  
    alias /var/www/html/sayhello/sayhello/static/;  
    expires 30d;  
    add_header Content-Type application/javascript;  
    add_header Content-Type text/css;  
}  
  
        location /css {  
            try_files $uri $uri/ =404;  
            add_header Content-Type text/css;  
        }  
        location /js {  
            try_files $uri $uri/ =404;  
            add_header Content-Type application/javascript;  
        }  
	        location / {    
        	    root /var/www/html/;    
            	    index index.html;    
		    try_files $uri $uri/ =404;
	        }    

}
